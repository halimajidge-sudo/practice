<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile - Online Leave Application System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            min-height: 100vh;
        }

        .profile-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px;
        }

        .profile-box {
            width: 700px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .profile-box h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .profile-box .subtitle {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.8;
            font-size: 14px;
        }

        /* Progress */
        .progress-bar-background {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            height: 6px;
            margin-bottom: 30px;
        }

        .progress-bar-fill {
            background: white;
            border-radius: 50px;
            height: 6px;
            width: 100%;
        }

        /* Section Titles */
        .section-title {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 15px;
            margin-top: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 8px;
        }

        /* Two-column grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group label i {
            margin-right: 6px;
            opacity: 0.8;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #1e3a8a;
        }

        .form-group input[readonly] {
            background: rgba(255, 255, 255, 0.9);
            color: #1e3a8a;
            cursor: default;
        }

        .form-group select {
            appearance: none;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #1e3a8a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #dbeafe;
        }

        .security-note {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            opacity: 0.7;
        }

        .security-note i {
            margin-right: 5px;
        }

        @media (max-width: 768px) {
            .profile-box {
                width: 100%;
                padding: 25px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-box">

        <h2>👤 Complete Your Profile</h2>
        <p class="subtitle">Step 2 of 2 — Just a few more details to get you started.</p>

        <div class="progress-bar-background">
            <div class="progress-bar-fill"></div>
        </div>

        <form id="profileForm" onsubmit="updateProfile(event)">

            <!-- Personal Information -->
            <p class="section-title">Personal Information</p>
            <div class="form-grid">

                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> Full Name</label>
                    <input type="text" id="name" readonly>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" readonly>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-venus-mars"></i> Gender</label>
                    <select id="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-days"></i> Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>

            </div>

            <!-- Employment Information -->
            <p class="section-title">Employment Information</p>
            <div class="form-grid">

                <div class="form-group">
                    <label><i class="fa-solid fa-id-card"></i> Employee ID</label>
                    <input type="text" id="employeeId" placeholder="Enter your Employee ID" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-building"></i> Department</label>
                    <input type="text" id="department" placeholder="e.g. Human Resources" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-user-tie"></i> Designation</label>
                    <input type="text" id="designation" placeholder="e.g. Software Engineer" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-check"></i> Joining Date</label>
                    <input type="date" id="joiningDate" required>
                </div>

            </div>

            <!-- Contact Information -->
            <p class="section-title">Contact Information</p>
            <div class="form-grid">

                <div class="form-group">
                    <label><i class="fa-solid fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-phone-volume"></i> Emergency Contact</label>
                    <input type="tel" id="emergencyContact" placeholder="Enter emergency contact" required>
                </div>

                <div class="form-group full-width">
                    <label><i class="fa-solid fa-map-marker-alt"></i> Address</label>
                    <input type="text" id="address" placeholder="Enter your full address" required>
                </div>

            </div>

            <button type="submit" class="submit-btn">
                Save & Continue
            </button>

            <p class="security-note">
                <i class="fa-solid fa-lock"></i> Your data is secured via end-to-end encryption.
            </p>

        </form>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
