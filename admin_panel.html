<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Online Leave Application System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1447d2,#7c3aed);
    min-height:100vh;
}

.admin-container{
    padding:50px 8%;
}

.admin-title{
    text-align:center;
    margin-bottom:40px;
}

.admin-title h1{
    color:white;
    font-size:42px;
}

.admin-title p{
    color:white;
    margin-top:8px;
}

.back-btn{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:white;
    color:#2563eb;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.back-btn:hover{
    background:#f1f5f9;
}

.admin-cards{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    margin-bottom:40px;
}

.admin-card{
    flex:1;
    min-width:250px;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.admin-card h2{
    color:#2563eb;
    font-size:40px;
}

.request-table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

.request-table th{
    background:linear-gradient(90deg,#2563eb,#a855f7);
    color:white;
}

.request-table th,
.request-table td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.approve-btn{
    background:#22c55e;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
    margin-right:5px;
}

.reject-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

.approve-btn:disabled,
.reject-btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

.approved{
    color:green;
    font-weight:bold;
}

.rejected{
    color:red;
    font-weight:bold;
}

.pending{
    color:orange;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="admin-container" id="admin-main-content" style="display: none;">

```
<div class="admin-title">
    <h1>👨‍💼 Admin Dashboard</h1>
    <p>Manage leave requests efficiently</p>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">
        ⬅ Back to Dashboard
    </button>
</div>

<div class="admin-cards">

    <div class="admin-card">
        <h2 id="totalRequests">0</h2>
        <p>Total Requests</p>
    </div>

    <div class="admin-card">
        <h2 id="approvedCount">0</h2>
        <p>Approved Leaves</p>
    </div>

    <div class="admin-card">
        <h2 id="pendingCount">0</h2>
        <p>Pending Leaves</p>
    </div>

</div>

<table class="request-table">

    <thead>
        <tr>
            <th>Employee</th>
            <th>Leave Type</th>
            <th>From Date</th>
            <th>To Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="adminTable"></tbody>

</table>
```

</div>

<script src="script.js"></script>

</body>
</html>
