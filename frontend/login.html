<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Leave Application System</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .login-container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .login-box{
            width:400px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(20px);
            padding:40px;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box label{
            display:block;
            margin-bottom:8px;
        }

        .input-box input{
            width:100%;
            padding:15px;
            border:none;
            outline:none;
            border-radius:12px;
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:50px;
            background:white;
            color:#1e3a8a;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
        }

        .extra{
            text-align:center;
            margin-top:20px;
        }

        .extra a{
            color:#38bdf8;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h2>🔐 Login</h2>

    <form onsubmit="loginUser(event)">

            <div class="input-box">
               <label>Email Address</label>
               <input id="loginEmail" type="email" placeholder="Enter Email" autocomplete="off" required>
            </div>

            <div class="input-box">
               <label>Password</label>
               <input id="loginPassword" type="password" placeholder="Enter Password" autocomplete="off" required>
            </div>

             <button class="login-btn">Login</button>

    </form>
        <div class="extra">
            Don't have an account?
            <a href="register.html">Register</a>
        </div>

    </div>

</div>
<script src="script.js"></script>
</body>
</html>
