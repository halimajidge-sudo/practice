<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave History - Online Leave Application System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1447d2,#7c3aed);
}

/* Navbar */
nav{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
    background:linear-gradient(90deg,#2563eb,#a855f7);
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:600;
    padding:8px 15px;
    border-radius:8px;
    transition:0.3s;
}

nav a:hover{
    background:rgba(255,255,255,0.2);
}

/* Container */
.history-container{
    padding:50px 8%;
}

.history-title{
    text-align:center;
    margin-bottom:30px;
}

.history-title h1{
    font-size:40px;
    color:white;
}

.history-title p{
    color:white;
}

/* Search + Button */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

#searchInput{
    padding:10px;
    width:250px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* Table */
.history-table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.history-table th,
.history-table td{
    padding:15px;
    text-align:center;
    border:1px solid #ddd;
}

.history-table th{
    background:linear-gradient(90deg,#1f6bff,#2ea8ff);
    color:white;
}

.approved{
    color:#22c55e;
    font-weight:bold;
}

.pending{
    color:#facc15;
    font-weight:bold;
}

.rejected{
    color:#ef4444;
    font-weight:bold;
}

.no-data{
    color:#666;
    text-align:center;
    padding:20px;
}

/* Mobile */
@media(max-width:768px){

    nav{
        flex-wrap:wrap;
    }

    .top-bar{
        flex-direction:column;
        align-items:flex-start;
    }

    #searchInput{
        width:100%;
    }
}

</style>
</head>
<body>

<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="apply_leave.html">Apply Leave</a>
    <a href="leave_history.html">Leave History</a>
    <a href="profile.html">Profile</a>
    <a href="admin_panel.html">Admin Penal</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<div class="history-container">

    <div class="history-title">
        <h1>📋 Leave History</h1>
        <p>Track all your leave applications</p>
    </div>

    <div class="top-bar">
        <input
            type="text"
            id="searchInput"
            placeholder="Search Leave Type">

        <button onclick="window.print()">
            Download Report
        </button>
    </div>

    <table class="history-table" id="historyTable">

        <thead>
            <tr>
                <th>Leave Type</th>
                <th>From Date</th>
                <th>To Date</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="leaveTable">
        </tbody>

    </table>

</div>

<script>

// Load Leave History
let leaveHistory =
JSON.parse(localStorage.getItem("leaveHistory")) || [];

let table = document.getElementById("leaveTable");

if(leaveHistory.length === 0){

    table.innerHTML = `
    <tr>
        <td colspan="4" class="no-data">
            No Leave Records Found
        </td>
    </tr>
    `;
}
else{

    leaveHistory.forEach(function(leave){

        let statusClass = "pending";

        if(leave.status === "Approved"){
            statusClass = "approved";
        }
        else if(leave.status === "Rejected"){
            statusClass = "rejected";
        }

        table.innerHTML += `
        <tr>
            <td>${leave.leaveType}</td>
            <td>${leave.fromDate}</td>
            <td>${leave.toDate}</td>
            <td class="${statusClass}">
                ${leave.status}
            </td>
        </tr>
        `;
    });
}

// Search Leave Type
document.getElementById("searchInput")
.addEventListener("keyup", function(){

    let filter = this.value.toLowerCase();

    let rows =
    document.querySelectorAll("#leaveTable tr");

    rows.forEach(function(row){

        let firstCell = row.querySelector("td");

        if(!firstCell) return;

        let text =
        firstCell.textContent.toLowerCase();

        row.style.display =
        text.includes(filter) ? "" : "none";
    });
});

// Logout
function logout(){

    localStorage.clear();

    alert("Logged Out Successfully!");

    window.location.href = "login.html";
}

</script>

</body>
</html>
